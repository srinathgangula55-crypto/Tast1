<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Student Registration</title>
  <link rel="icon" href="https://img.icons8.com/stickers/1200/student-registration.jpg" type="image/png">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <!-- Header -->
  <header>
    <h1 align="center"> Student Registration Form</h1>
  </header>
  <!-- Navbar  -->
  <nav align="center">
    <a href="">Home</a>
    <a href="blank">Register</a>
    <a href="#">More </a>
    
  </nav>
  <!-- for registration -->
   <form align="center">
    <h2>Register Student</h2>
    <table border="4" align="center">
      <tr>
        <td>Name</td>
        <td> <input type="text" placeholder="Enter your name" required> </td>
      </tr>
      <tr>
        <td>Email</td>
        <td> <input type="email" placeholder="Enter email" required> </td>
      </tr>
      <tr>
        <td>Name</td>
        <td> <input type="tel" placeholder="Enter Phone Number" required> </td>
      </tr>
      <tr>
        <td>Gender</td>
        <td><input type="radio"> Male
            <input type="radio"> Female
        </td>
      </tr>
      <tr>
        <td>Skills </td>
         <td>
            <input type="checkbox"> HTML
            <input type="checkbox"> CSS
            <input type="checkbox"> JavaScript
            <input type="checkbox"> Pega
          </td>
      </tr>
      <tr>
        <td>Course</td>
        <td>
          <select>
            <option>B.Tech</option>
            <option>Degree</option>
            <option>MCA</option>
      
          </select>
        </td>
      </tr>
      <tr>
        <td>DOB</td>
        <td> <input type="date"></td>
      </tr>
      <tr>
        <td>Address</td>
        <td> <textarea cols="90"></textarea></td>
        
      </tr>
      <tr>
          <td colspan="2">
            <input type="submit" name="Register">
            <input type="reset"  name="Clear">
          </td>
        </tr>
    </table>


   </form>
   <aside align="center">
  <p>Note: Please fill all required fields carefully.</p>
</aside>

<footer align="center">
  <p>© 2026 Student Registration Portal</p>
</footer>
</body>
</html>
