<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Image Layout </title>
  <link rel="stylesheet" href="29/04 task1.css"
</head>
<body>

<div>

  <h2>Image Display Arrangement</h2>

  <section>
    <h3>Images as Block (display: block)</h3>
    <p>Each image takes its own line and stacks vertically.</p>
    
    <img src="https://images.ctfassets.net/hrltx12pl8hq/28ECAQiPJZ78hxatLTa7Ts/2f695d869736ae3b0de3e56ceaca3958/free-nature-images.jpg?fit=fill&w=1200&h=630" class="block-image">
    
    <img src="https://images.ctfassets.net/hrltx12pl8hq/28ECAQiPJZ78hxatLTa7Ts/2f695d869736ae3b0de3e56ceaca3958/free-nature-images.jpg?fit=fill&w=1200&h=630" class="block-image">
  </section>

  <section>
    <h3>Images in Flexbox (display: flex)</h3>
    <p>Images sit in a row and are spaced evenly.</p>

    <div class="Flexbox">
      <img src="https://images.ctfassets.net/hrltx12pl8hq/28ECAQiPJZ78hxatLTa7Ts/2f695d869736ae3b0de3e56ceaca3958/free-nature-images.jpg?fit=fill&w=1200&h=630">
      <img src="https://images.ctfassets.net/hrltx12pl8hq/28ECAQiPJZ78hxatLTa7Ts/2f695d869736ae3b0de3e56ceaca3958/free-nature-images.jpg?fit=fill&w=1200&h=630">
      <img src="https://images.ctfassets.net/hrltx12pl8hq/28ECAQiPJZ78hxatLTa7Ts/2f695d869736ae3b0de3e56ceaca3958/free-nature-images.jpg?fit=fill&w=1200&h=630">
    </div>
  </section>

  <section>
    <h3>Images in Grid (display: grid)</h3>
    <p>Organized into a 3-column structure.</p>

    <div class="grid">
      <img src="https://thumbs.dreamstime.com/b/city-park-pond-shore-alley-20238927.jpg">
      <img src="https://thumbs.dreamstime.com/b/city-park-pond-shore-alley-20238927.jpg">
      <img src="https://thumbs.dreamstime.com/b/city-park-pond-shore-alley-20238927.jpg">
      <img src="https://thumbs.dreamstime.com/b/city-park-pond-shore-alley-20238927.jpg">
      <img src="https://thumbs.dreamstime.com/b/city-park-pond-shore-alley-20238927.jpg">
      
    </div>
  </section>

</div>

</body>
</html>
